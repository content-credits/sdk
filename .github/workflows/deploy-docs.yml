# Builds the Docusaurus docs site and deploys it to the production EC2 instance.
#
# Reuses the same secrets already set up for the backend deploy:
#   EC2_HOST            — Elastic IP of the EC2 instance
#   EC2_SSH_PRIVATE_KEY — Contents of contentcredits-key.pem
#
# The built static files are rsync'd to /home/ec2-user/docs on EC2.
# Nginx serves them at https://docs.contentcredits.com via the volume mount
# added in infra/docker-compose.yml:  /home/ec2-user/docs → /var/www/docs
#
# ── One-time EC2 setup (only needed once after the nginx config is deployed) ──
#   SSH into EC2 and run:
#     sudo certbot certonly --webroot \
#       -w /var/www/certbot \
#       -d docs.contentcredits.com \
#       --non-interactive --agree-tos -m your@email.com
#     docker compose exec nginx nginx -s reload
#
# ── DNS record (add at your registrar) ──────────────────────────────────────
#   Type  A
#   Name  docs
#   Value <EC2 Elastic IP>   ← same IP already used for api.contentcredits.com
#   TTL   300

name: Deploy Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build Docusaurus site
        working-directory: docs-site
        run: npm run build

      - name: Copy docs to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: mkdir -p /home/ec2-user/docs

      - name: Rsync build to EC2
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete
          path: docs-site/build/
          remote_path: /home/ec2-user/docs/
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ec2-user
          remote_key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user/app
            docker compose exec -T nginx nginx -s reload
            echo "Docs deployed successfully."
