# Builds the Docusaurus docs site and deploys it to the production EC2 instance.
#
# The built static files are rsync'd to /home/ec2-user/docs on EC2.
# Nginx serves them at https://docs.contentcredits.com via the mount:
#   /home/ec2-user/docs → /var/www/docs (inside cc_nginx container)
#
# ── One-time EC2 setup (run once after first deploy) ────────────────────────
#   1. SSH into EC2 and issue the SSL cert:
#        sudo certbot certonly --webroot \
#          -w /var/www/certbot \
#          -d docs.contentcredits.com \
#          --non-interactive --agree-tos -m your@email.com
#   2. Reload nginx to pick up the new cert:
#        docker exec cc_nginx nginx -s reload
#
# ── Required GitHub secrets (add to the SDK repo) ───────────────────────────
#   EC2_HOST      — Elastic IP of the EC2 instance (e.g. 54.x.x.x)
#   EC2_SSH_KEY   — Contents of contentcredits-key.pem (the private key)
#
# ── DNS record (add at your registrar) ──────────────────────────────────────
#   Type  A
#   Name  docs
#   Value <EC2 Elastic IP>
#   TTL   300 (or lowest available)

name: Deploy Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build Docusaurus site
        working-directory: docs-site
        run: npm run build

      # ── SSH key setup ───────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # ── Sync static files to EC2 ────────────────────────────────────────────
      - name: Sync docs to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            docs-site/build/ \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/docs/

      # ── Reload nginx to pick up any new files ───────────────────────────────
      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ec2-user@${{ secrets.EC2_HOST }} \
              "docker exec cc_nginx nginx -s reload"
