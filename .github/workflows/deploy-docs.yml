# Builds the Docusaurus site and deploys with GitHub’s official Pages Actions.
#
# One-time repo setup (Settings → Pages):
#   1. Build and deployment → Source: GitHub Actions (not “Deploy from a branch”).
#   2. Custom domain: docs.contentcredits.com (matches docusaurus.config.ts + static/CNAME).
#   3. DNS at your registrar:
#        Type CNAME, name docs, target: <your-github-username-or-org>.github.io
#      GitHub shows the exact value when you save the custom domain.
#   4. Wait for the “DNS check” to pass; HTTPS is issued automatically.
#
# If you change the hostname, update: static/CNAME, docusaurus.config.ts url, and Pages settings.

name: Deploy Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build site
        working-directory: docs-site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
